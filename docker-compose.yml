services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BubA54MuR
      POSTGRES_DB: wordstat_analyzer
    # ports:
    #   - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:BubA54MuR@db:5432/wordstat_analyzer
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db
      - redis
    volumes:
      - .:/app  # Синхронизируем корень проекта с папкой /app в контейнере для hot-reload
    entrypoint: /app/entrypoint.sh

volumes:
  postgres_data: